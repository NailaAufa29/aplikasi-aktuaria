<!DOCTYPE html>
<html>

<head>
    <title>Probabilitas Aktuaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Probabilitas Aktuaria</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <p>
                Probabilitas dalam aktuaria digunakan untuk menghitung kemungkinan kejadian hidup atau meninggal.
            </p>

            <div class="alert alert-info">
                Rumus dasar:
                <br>
                P(X) = jumlah kejadian yang diinginkan / jumlah seluruh kejadian
            </div>

            <ul>
                <li>Probabilitas hidup: pₓ</li>
                <li>Probabilitas meninggal: qₓ = 1 - pₓ</li>
            </ul>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-outline-dark">
                    ← Kembali ke Dashboard
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
