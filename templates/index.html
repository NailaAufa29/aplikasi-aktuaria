<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AktuariaKu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo" alt="Logo">
                <span>AktuariaKu</span>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION (BACKGROUND IMAGE) -->
    <section class="hero">
        <div class="hero-overlay">
            <div class="container">

                <div class="hero-content">

                    <span class="badge-soft">
                        Actuarial Analytics Platform
                    </span>

                    <h1>
                        Life Insurance Premium Calculation
                    </h1>

                    <p>
                        Perhitungan Premi Asuransi Jiwa
                    </p>

                    <a href="#modul" class="btn-start">
                        Mulai
                    </a>

                </div>

            </div>
        </div>
    </section>

    <!-- MODULE SECTION -->
    <section id="modul" class="modules">
        <div class="container">

            <h2 class="section-title">MENU</h2>

            <div class="row g-4 justify-content-center">

                <!-- Asuransi Berjangka -->
                <div class="col-12 col-md-6 col-lg-3">
                    <a href="/berjangka" class="menu-link">
                        <div class="module-card">
                            <div class="icon">🛡️</div>
                            <h4>Asuransi Berjangka</h4>
                        </div>
                    </a>
                </div>

                <!-- Seumur Hidup -->
                <div class="col-12 col-md-6 col-lg-3">
                    <a href="/seumur_hidup" class="menu-link">
                        <div class="module-card">
                            <div class="icon">❤️</div>
                            <h4>Seumur Hidup</h4>
                        </div>
                    </a>
                </div>

                <!-- Dwiguna -->
                <div class="col-12 col-md-6 col-lg-3">
                    <a href="/dwiguna" class="menu-link">
                        <div class="module-card">
                            <div class="icon">🎯</div>
                            <h4>Dwiguna</h4>
                        </div>
                    </a>
                </div>

            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <h5>AktuariaKu</h5>
        <p>Life Insurance Premium Calculation</p>
    </footer>

</body>
</html>
