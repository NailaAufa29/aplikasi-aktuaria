<!DOCTYPE html>
<html>

<head>
    <title>Tabel Mortalitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Tabel Mortalitas</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <p>
                Tabel mortalitas digunakan dalam aktuaria untuk menunjukkan probabilitas seseorang
                meninggal pada usia tertentu.
            </p>

            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Usia (x)</th>
                        <th>lx (hidup)</th>
                        <th>dx (meninggal)</th>
                        <th>qx</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>30</td>
                        <td>100000</td>
                        <td>120</td>
                        <td>0.0012</td>
                    </tr>
                    <tr>
                        <td>40</td>
                        <td>99800</td>
                        <td>180</td>
                        <td>0.0018</td>
                    </tr>
                    <tr>
                        <td>50</td>
                        <td>99500</td>
                        <td>300</td>
                        <td>0.0030</td>
                    </tr>
                </tbody>
            </table>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-outline-dark">
                    ← Kembali ke Dashboard
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
