<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <title>Asuransi Seumur Hidup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .card-form{
            max-width:800px;
            margin:auto;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .header{
            background:linear-gradient(135deg,#198754,#56ab91);
            color:white;
            padding:25px;
            border-radius:20px 20px 0 0;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card card-form">

        <div class="header">

            <h2>
                💚 Asuransi Seumur Hidup
            </h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>
                        Usia 
                    </label>

                    <input type="number"
                           name="usia"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Suku Bunga (%)
                    </label>

                    <input type="number"
                           step="0.01"
                           name="bunga"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Uang Pertanggungan (Rp)
                    </label>

                    <input type="number"
                           name="manfaat"
                           class="form-control"
                           required>

                </div>

                <button class="btn btn-success w-100">

                    Hitung Premi

                </button>

            </form>

            {% if hasil %}

            <div class="alert alert-success mt-4 text-center">

                <h5>
                    Premi Tunggal Bersih
                </h5>

                <h2>
                    Rp {{ "{:,.2f}".format(hasil) }}
                </h2>

            </div>

            {% endif %}

            <div class="text-center mt-3">

                <a href="/"
                   class="btn btn-outline-dark">

                    ← Kembali

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
